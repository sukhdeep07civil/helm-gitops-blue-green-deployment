apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service-blue

spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: app-service
      version: blue
  template:
    metadata:
      labels:
        app: app-service
        version: blue
    spec:
      containers:
        - name: app-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PORT
              value: {{ .Values.env.port | quote }}
